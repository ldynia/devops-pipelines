steps:
  # # Add ssh kye in order to fetch git submodules
  # - task: InstallSSHKey@0
  #   displayName: Install SSH-Key for $(project-name)
  #   inputs:
  #     knownHostsEntry: ssh.dev.azure.com
  #     sshPublicKey: $(ssh-public-key)
  #     sshKeySecureFile: $(project-name)

  - checkout: self
    submodules: recursive

  - task: Docker@2
    displayName: Build Docker Image
    inputs:
      command: build
      repository: $(BackendImageName)
      tags: $(BackendImageTag)
      dockerfile: '$(Build.SourcesDirectory)/docker/Dockerfile'
      buildContext: '$(Build.SourcesDirectory)/app'

  - task: CmdLine@2
    displayName: Run App Test
    inputs:
      script: |
        # Postgres SetUp
        # printf "${YELLOW}Export Envars${NC}\n"
        # export $(cat .env | xargs)

        # Postgres SetUp
        # printf "${YELLOW}Run App${NC}\n"
        # docker network create app
        # docker run --rm --detach --name postgres --env-file .env --network app -p ${POSTGRES_PORT}:${POSTGRES_PORT} -e POSTGRES_PASSWORD=postgres -d postgres -p ${POSTGRES_PORT}
        # docker run --rm --detach --name $(BackendContainerName) --env-file .env --network app $(BackendImageArtifact)

        printf "${YELLOW}Run App${NC}\n"
        docker run --rm --detach --name $(BackendContainerName) $(BackendImageArtifact)

        printf "${YELLOW}Sleep for 10s${NC}\n"
        sleep 10s

        printf "${YELLOW}Start Unit Tests${NC}\n"
        docker exec $(BackendContainerName) sh -c '/app/test.sh'
